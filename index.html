<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal BI Fundação INOVA - V2</title>
<link rel="icon" href="img/icone_inova.png" type="image/png">
<link rel="apple-touch-icon" href="img/icone_atalho.png">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div class="toggle-float" onclick="voltarPortal()">
    <i class="bi bi-arrow-left"></i>
</div>

<aside class="sidebar">

    <div class="logo">
        <img src="img/logo-inova.png" alt="Fundação INOVA">
    </div>

    <div class="toggle" onclick="toggleMenu()">
        <i class="bi bi-list"></i>
    </div>

    <nav class="menu" id="menuContainer">
        <!-- Gerado automaticamente pelo app.js -->
    </nav>

</aside>

<main class="content">

    <header class="header">

        <div class="header-title">
            Portal BI Fundação INOVA
        </div>

        <div class="user-area">

            <button class="logout" onclick="logout()">
                <i class="bi bi-box-arrow-right"></i>
                Sair
            </button>

        </div>

    </header>

    <section id="home">

        <h1 class="titulo-home">
            Portal BI Fundação INOVA
        </h1>

        <p class="subtitulo-home">
            Selecione um painel para iniciar a navegação.
        </p>

        <div id="cardsContainer" class="cards">
            <!-- Gerado automaticamente -->
        </div>

    </section>

    <section id="viewer">

        <iframe
            id="painelFrame"
            title="Power BI">
        </iframe>

    </section>

</main>

<div id="modalAbrir" class="modal">

    <div class="modal-box">

        <h2>Abrir Painel</h2>

        <h3 id="tituloPainel"></h3>

        <p>Como deseja visualizar este painel?</p>

        <div class="modal-buttons">

            <button class="btn-modal btn-portal"
                    onclick="abrirNoPortal()">
                <i class="bi bi-display"></i>
                Abrir no Portal
            </button>

            <button class="btn-modal btn-novaaba"
                    onclick="abrirNovaAba()">
                <i class="bi bi-box-arrow-up-right"></i>
                Abrir em Nova Aba
            </button>

            <button class="btn-modal btn-cancelar"
                    onclick="fecharModal()">
                Cancelar
            </button>

        </div>

    </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
